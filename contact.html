<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Get Real</title>
  <meta name="description" content="Get in touch with Get Real. Questions, partnerships, or just want to say hi.">
  <meta name="theme-color" content="#1A1A2E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400;1,9..40,500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { overflow-x: hidden; }

    body {
      font-family: 'DM Sans', sans-serif;
      color: #FFFFFF;
      background: #1A1A2E;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    h1, h2, h3 {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      line-height: 1.1;
    }

    a { color: inherit; text-decoration: none; }
    button { font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; }
    input, textarea { font-family: 'DM Sans', sans-serif; border: none; outline: none; }

    /* ===================== ORB SYSTEM ===================== */
    .orb-field {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      will-change: transform;
    }

    .orb--orange {
      background: radial-gradient(circle, rgba(255, 107, 53, 0.25) 0%, rgba(255, 107, 53, 0) 70%);
    }

    .orb--red {
      background: radial-gradient(circle, rgba(232, 83, 63, 0.18) 0%, rgba(232, 83, 63, 0) 70%);
    }

    /* ===================== LAYOUT ===================== */
    .back-link {
      position: fixed;
      top: 28px;
      left: 28px;
      z-index: 10;
      font-size: 0.9rem;
      color: #B0B0C0;
      transition: color 0.3s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .back-link:hover { color: #FF6B35; }

    .back-arrow {
      display: inline-block;
      transition: transform 0.3s;
    }

    .back-link:hover .back-arrow {
      transform: translateX(-4px);
    }

    .contact-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      padding: 100px 24px 60px;
    }

    .contact-card {
      width: 100%;
      max-width: 560px;
    }

    .contact-headline {
      font-size: clamp(2.5rem, 6vw, 4rem);
      margin-bottom: 12px;
      opacity: 0;
      transform: translateY(40px);
    }

    .contact-subtitle {
      font-size: clamp(1rem, 1.5vw, 1.15rem);
      color: #B0B0C0;
      margin-bottom: 48px;
      opacity: 0;
      transform: translateY(30px);
    }

    /* ===================== FORM ===================== */
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
      opacity: 0;
      transform: translateY(30px);
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-field label {
      font-size: 0.85rem;
      font-weight: 500;
      color: #B0B0C0;
      letter-spacing: 0.03em;
    }

    .form-field input,
    .form-field textarea {
      padding: 18px 24px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #FFFFFF;
      font-size: 1rem;
      transition: border-color 0.4s, background 0.4s, box-shadow 0.4s;
    }

    .form-field input::placeholder,
    .form-field textarea::placeholder {
      color: #555;
    }

    .form-field input:focus,
    .form-field textarea:focus {
      border-color: #FF6B35;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.1);
    }

    .form-field textarea {
      resize: vertical;
      min-height: 140px;
      line-height: 1.6;
    }

    .btn-submit {
      display: inline-block;
      background: #FF6B35;
      color: #FFFFFF;
      font-size: 1.05rem;
      font-weight: 600;
      padding: 20px 44px;
      border-radius: 60px;
      transition: background 0.3s, transform 0.3s, box-shadow 0.3s;
      letter-spacing: 0.01em;
      position: relative;
      overflow: hidden;
      align-self: flex-start;
      margin-top: 8px;
    }

    .btn-submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .btn-submit:hover {
      background: #E8533F;
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 40px rgba(255, 107, 53, 0.35);
    }

    .btn-submit:hover::before { opacity: 1; }

    .form-note {
      font-size: 0.82rem;
      color: #555;
      margin-top: 4px;
    }

    /* ===================== FOOTER ===================== */
    footer {
      background: #0E0E1E;
      padding: 36px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      position: relative;
      z-index: 1;
    }

    .footer-left {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: #B0B0C0;
    }

    .footer-right {
      font-size: 0.85rem;
      color: #555;
      text-align: right;
      line-height: 1.65;
    }

    .footer-right a {
      color: #777;
      transition: color 0.3s;
    }

    .footer-right a:hover { color: #FF6B35; }

    /* ===================== RESPONSIVE ===================== */
    @media (max-width: 768px) {
      .contact-wrapper {
        padding: 80px 20px 40px;
      }

      .btn-submit {
        width: 100%;
        text-align: center;
      }

      footer {
        flex-direction: column;
        text-align: center;
      }

      .footer-right { text-align: center; }
    }

    /* ===================== GRAIN ===================== */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px 128px;
    }
  </style>
</head>
<body>

  <!-- Background Orbs -->
  <div class="orb-field">
    <div class="orb orb--orange" style="width:600px;height:600px;top:-150px;right:-120px;"></div>
    <div class="orb orb--red" style="width:400px;height:400px;bottom:-100px;left:-80px;"></div>
  </div>

  <!-- Back Link -->
  <a href="/" class="back-link"><span class="back-arrow">&larr;</span> Back to home</a>

  <!-- Contact Form -->
  <main class="contact-wrapper">
    <div class="contact-card">
      <h1 class="contact-headline" id="headline">Get in touch</h1>
      <p class="contact-subtitle" id="subtitle">Questions, partnerships, or just want to say hi.</p>
      <form class="contact-form" id="contactForm" action="https://formsubmit.co/getrealfinances@gmail.com" method="POST">
        <input type="hidden" name="_subject" value="New contact from Get Real website">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="https://getreal.money/contact.html?sent=1">
        <input type="text" name="_honey" style="display:none">
        <div class="form-field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required autocomplete="name">
        </div>
        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required autocomplete="email">
        </div>
        <div class="form-field">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="What's on your mind?" required></textarea>
        </div>
        <button type="submit" class="btn-submit">Send Message</button>
        <p id="contactSuccess" style="display:none; color:#FF6B35; font-size:0.95rem; margin-top:12px;">Message sent! We'll get back to you soon.</p>
      </form>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-left">Get Real &copy; 2026</div>
    <div class="footer-right">
      <a href="mailto:getrealfinances@gmail.com">getrealfinances@gmail.com</a>
    </div>
  </footer>

  <!-- Animations -->
  <script>
    const tl = gsap.timeline({ delay: 0.2 });
    tl
      .to('#headline', { opacity: 1, y: 0, duration: 0.7, ease: 'power3.out' })
      .to('#subtitle', { opacity: 1, y: 0, duration: 0.6, ease: 'power3.out' }, '-=0.3')
      .to('#contactForm', { opacity: 1, y: 0, duration: 0.7, ease: 'power3.out' }, '-=0.3');

    // Orb float
    document.querySelectorAll('.orb').forEach((orb, i) => {
      gsap.to(orb, {
        x: `+=${25 + i * 15}`,
        y: `+=${15 + i * 10}`,
        duration: 7 + i * 2,
        ease: 'sine.inOut',
        yoyo: true,
        repeat: -1
      });
    });

    // Show success message if redirected back after submission
    if (window.location.search.includes('sent=1')) {
      document.getElementById('contactSuccess').style.display = 'block';
      document.getElementById('contactForm').reset();
    }

    // Magnetic button
    if (window.matchMedia('(pointer: fine)').matches) {
      const btn = document.querySelector('.btn-submit');
      btn.addEventListener('mousemove', e => {
        const rect = btn.getBoundingClientRect();
        const x = e.clientX - rect.left - rect.width / 2;
        const y = e.clientY - rect.top - rect.height / 2;
        gsap.to(btn, { x: x * 0.15, y: y * 0.15, duration: 0.3, ease: 'power2.out' });
      });
      btn.addEventListener('mouseleave', () => {
        gsap.to(btn, { x: 0, y: 0, duration: 0.5, ease: 'elastic.out(1, 0.5)' });
      });
    }
  </script>

</body>
</html>
